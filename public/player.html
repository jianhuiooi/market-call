<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HK Monopoly Deal — Fund Manager</title>
<script src="/socket.io/socket.io.js"></script>
<script>if (typeof io === 'undefined') { document.write('<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"><\/script>'); }</script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Space+Mono:wght@400;700&family=Noto+Sans+HK:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0e; --surface:#111118; --surface2:#181820;
    --border:#2a2a3a; --border2:#3a3a4a;
    --crimson:#dc143c; --crimson-glow:rgba(220,20,60,0.25);
    --gold:#c9a84c; --gold-light:#f0cc6e; --gold-glow:rgba(201,168,76,0.2);
    --cream:#f5f0e8; --ivory:#e8e0d0;
    --jade:#00a878; --jade-glow:rgba(0,168,120,0.2);
    --cobalt:#1a3a8a; --cobalt-light:#2a5aaa;
    --text:#e8e0d0; --muted:#5a5a72;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    background:var(--bg);
    background-image:
      radial-gradient(ellipse 80% 50% at 50% 100%, rgba(201,168,76,0.04) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 80% 20%, rgba(220,20,60,0.03) 0%, transparent 60%);
    color:var(--text);
    font-family:'Noto Sans HK',sans-serif;
    min-height:100vh;
    overscroll-behavior:none;
  }

  /* ── SCREENS ── */
  .screen { display:none; padding:20px 18px; min-height:100vh; }
  .screen.active { display:block; }

  /* ── JOIN SCREEN ── */
  .join-card {
    background:linear-gradient(135deg,#12120a,#0a0a12);
    border:2px solid var(--gold);
    border-radius:12px;
    padding:24px 20px;
    margin-bottom:20px;
    position:relative;
    overflow:hidden;
    box-shadow:0 0 40px rgba(201,168,76,0.08);
  }
  .join-card::before {
    content:'';
    position:absolute; inset:4px;
    border:1px solid rgba(201,168,76,0.15);
    border-radius:8px;
    pointer-events:none;
  }
  .join-logo { font-family:'Playfair Display',serif; font-size:34px; font-weight:900; color:var(--gold-light); line-height:1; }
  .join-deal { font-family:'Playfair Display',serif; font-size:18px; color:var(--crimson); letter-spacing:2px; }
  .join-sub { font-family:'Space Mono',monospace; font-size:9px; color:var(--muted); letter-spacing:3px; margin-top:2px; }
  .join-cn { font-family:'Noto Sans HK',sans-serif; font-size:11px; color:var(--muted); letter-spacing:2px; margin-top:4px; opacity:0.7; }

  .asset-mini { display:flex; gap:6px; margin-top:12px; }
  .asset-mini-tile {
    flex:1; padding:6px 4px; border-radius:4px; text-align:center;
    font-family:'Space Mono',monospace; font-size:8px; letter-spacing:0.5px;
  }
  .asset-mini-tile.re { background:rgba(139,0,0,0.15); border:1px solid rgba(139,0,0,0.35); color:#ff8a8a; }
  .asset-mini-tile.eq { background:rgba(0,100,0,0.15); border:1px solid rgba(0,164,0,0.35); color:#8aff8a; }
  .asset-mini-tile.bd { background:rgba(26,58,138,0.15); border:1px solid rgba(42,90,170,0.35); color:#8aafff; }
  .asset-mini-tile.fx { background:rgba(201,168,76,0.1); border:1px solid rgba(201,168,76,0.35); color:var(--gold-light); }
  .asset-mini-tile .mini-icon { font-size:14px; display:block; margin-bottom:2px; }

  .input-group { margin-bottom:14px; }
  .input-label { font-family:'Space Mono',monospace; font-size:10px; color:var(--muted); letter-spacing:2px; margin-bottom:6px; display:block; }
  input[type=text] {
    width:100%;
    background:var(--surface);
    border:1px solid var(--border);
    color:var(--text);
    font-family:'Noto Sans HK',sans-serif; font-size:16px;
    padding:12px 14px; border-radius:4px; outline:none;
    transition:border-color 0.2s;
  }
  input[type=text]:focus { border-color:var(--gold); box-shadow:0 0 0 2px rgba(201,168,76,0.1); }
  .btn-full {
    width:100%;
    background:linear-gradient(135deg,var(--gold),#8a6000);
    color:#000; font-family:'Space Mono',monospace; font-size:13px; font-weight:700;
    letter-spacing:2px; padding:14px; border:none; border-radius:4px;
    cursor:pointer; margin-top:6px; transition:all 0.2s;
    text-shadow:none;
    box-shadow:0 2px 12px rgba(201,168,76,0.2);
  }
  .btn-full:active { transform:scale(0.98); }
  .btn-full:disabled { opacity:0.3; }

  /* ── GAME SCREEN TOP ── */
  .portfolio-bar {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:8px;
    padding:12px 14px;
    margin-bottom:14px;
    display:flex; justify-content:space-between; align-items:center;
  }
  .player-name-tag { font-family:'Space Mono',monospace; font-size:10px; color:var(--muted); letter-spacing:1px; }
  .player-title { font-size:13px; color:var(--text); margin-top:2px; }
  .capital-display { font-family:'Playfair Display',serif; font-size:32px; font-weight:900; color:var(--gold-light); text-shadow:0 0 12px var(--gold-glow); }
  .capital-label { font-family:'Space Mono',monospace; font-size:9px; color:var(--muted); letter-spacing:1px; text-align:right; }

  /* ── WAIT ── */
  .wait-box { text-align:center; padding:40px 16px; }
  .wait-card {
    background:linear-gradient(135deg,#12120a,#0a0a12);
    border:1px solid rgba(201,168,76,0.3);
    border-radius:10px; padding:24px; margin-bottom:16px;
    display:inline-block;
  }
  .wait-icon { font-size:36px; display:block; margin-bottom:10px; }
  .wait-title { font-family:'Playfair Display',serif; font-size:22px; color:var(--gold); letter-spacing:1px; }
  .wait-sub { font-family:'Space Mono',monospace; font-size:10px; color:var(--muted); letter-spacing:1px; margin-top:8px; }
  .wait-dots { display:flex; justify-content:center; gap:6px; margin-top:14px; }
  .wait-dot { width:8px; height:8px; background:var(--gold); border-radius:50%; animation:bounce 1.2s ease-in-out infinite; }
  .wait-dot:nth-child(2) { animation-delay:0.2s; background:var(--crimson); }
  .wait-dot:nth-child(3) { animation-delay:0.4s; background:var(--jade); }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

  /* ── ROUND TITLE & TIMER ── */
  .round-title { font-family:'Playfair Display',serif; font-size:18px; color:var(--text); margin-bottom:4px; }
  .card-pill {
    display:inline-flex; align-items:center; gap:6px;
    font-family:'Space Mono',monospace; font-size:9px; letter-spacing:2px;
    padding:4px 10px; border-radius:20px; margin-bottom:10px;
    background:rgba(220,20,60,0.1); border:1px solid rgba(220,20,60,0.35); color:var(--crimson);
  }
  .card-pill.green { background:rgba(0,168,120,0.1); border-color:rgba(0,168,120,0.35); color:var(--jade); }
  .card-pill.gold { background:rgba(201,168,76,0.08); border-color:rgba(201,168,76,0.35); color:var(--gold); }

  .timer-bar-wrap { background:var(--surface); border-radius:2px; height:4px; margin:8px 0 16px; overflow:hidden; }
  .timer-bar { height:100%; background:var(--gold); border-radius:2px; transition:width 1s linear,background 0.3s; }
  .timer-bar.urgent { background:var(--crimson); }

  /* ── MARKET SECTIONS ── */
  .market-section {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:8px;
    padding:12px;
    margin-bottom:10px;
  }
  .market-label { font-family:'Space Mono',monospace; font-size:10px; color:var(--cobalt-light); letter-spacing:2px; margin-bottom:8px; display:flex; align-items:center; gap:6px; }
  .market-type-dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
  .market-type-dot.prop { background:#ff4444; }
  .market-type-dot.eq { background:var(--jade); }
  .market-type-dot.bond { background:var(--cobalt-light); }
  .market-type-dot.fx { background:var(--gold); }

  .direction-btns { display:flex; gap:5px; margin-bottom:8px; }
  .dir-btn {
    flex:1; padding:9px 4px; border-radius:5px;
    font-family:'Space Mono',monospace; font-size:12px;
    border:1px solid var(--border); background:var(--surface2);
    color:var(--muted); cursor:pointer; transition:all 0.15s; text-align:center;
  }
  .dir-btn.long-btn.selected { background:rgba(0,168,120,0.1); border-color:var(--jade); color:var(--jade); box-shadow:0 0 10px rgba(0,168,120,0.12); }
  .dir-btn.short-btn.selected { background:rgba(220,20,60,0.1); border-color:var(--crimson); color:var(--crimson); box-shadow:0 0 10px rgba(220,20,60,0.12); }
  .dir-btn.skip-btn.selected { background:rgba(90,90,114,0.15); border-color:var(--muted); color:var(--muted); }

  .amount-row { display:flex; gap:4px; margin-bottom:6px; }
  .amt-btn {
    flex:1; min-width:0; padding:6px 2px; border-radius:3px;
    font-family:'Space Mono',monospace; font-size:10px;
    border:1px solid var(--border); background:var(--surface2);
    color:var(--muted); cursor:pointer; transition:all 0.15s; text-align:center;
  }
  .amt-btn.selected { border-color:var(--gold); color:var(--gold); background:rgba(201,168,76,0.07); }

  .mult-label { font-family:'Space Mono',monospace; font-size:9px; color:var(--muted); letter-spacing:1px; margin-bottom:3px; }
  .mult-row { display:flex; gap:4px; }
  .mult-btn {
    flex:1; padding:5px 2px; border-radius:3px;
    font-family:'Space Mono',monospace; font-size:11px;
    border:1px solid var(--border); background:var(--surface2);
    color:var(--muted); cursor:pointer; transition:all 0.15s; text-align:center;
  }
  .mult-btn.selected { border-color:var(--cobalt-light); color:var(--cobalt-light); background:rgba(42,90,170,0.08); }
  .mult-btn[data-mult="2"].selected { border-color:var(--gold); color:var(--gold); background:rgba(201,168,76,0.08); }
  .mult-btn[data-mult="3"].selected { border-color:var(--crimson); color:var(--crimson); background:rgba(220,20,60,0.08); }

  /* ── SUBMIT SECTION ── */
  .submit-section { margin-top:14px; padding-top:14px; border-top:1px solid var(--border); }
  .tip-btn {
    width:100%; background:transparent;
    color:var(--gold); border:1px solid rgba(201,168,76,0.4);
    font-family:'Space Mono',monospace; font-size:11px;
    letter-spacing:1px; padding:9px; border-radius:4px;
    cursor:pointer; margin-bottom:8px; transition:all 0.2s;
  }
  .tip-btn:hover { background:rgba(201,168,76,0.07); }
  .tip-box {
    background:rgba(201,168,76,0.05);
    border:1px solid rgba(201,168,76,0.3);
    border-left:3px solid var(--gold);
    border-radius:0 6px 6px 0;
    padding:10px 12px; margin-bottom:8px;
    font-size:12px; line-height:1.6; color:var(--gold-light);
    animation:fadeIn 0.4s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }

  /* ── RESULT BOX ── */
  .result-box { text-align:center; padding:28px 14px; }
  .result-label { font-family:'Space Mono',monospace; font-size:10px; color:var(--muted); letter-spacing:2px; margin-bottom:8px; }
  .result-pnl { font-family:'Playfair Display',serif; font-size:68px; font-weight:900; }
  .result-pnl.up { color:var(--jade); text-shadow:0 0 20px var(--jade-glow); }
  .result-pnl.down { color:var(--crimson); text-shadow:0 0 20px var(--crimson-glow); }
  .result-total { font-family:'Space Mono',monospace; font-size:13px; color:var(--text); margin-top:6px; }

  /* ── END BOX ── */
  .end-box { text-align:center; padding:28px 14px; }
  .end-title { font-family:'Playfair Display',serif; font-size:40px; font-weight:900; color:var(--gold); margin-bottom:6px; text-shadow:0 0 20px var(--gold-glow); letter-spacing:2px; }

  .tag { display:inline-block; font-family:'Space Mono',monospace; font-size:10px; padding:2px 8px; border-radius:2px; letter-spacing:1px; }
  .tag-live { background:rgba(220,20,60,0.12); color:var(--crimson); border:1px solid rgba(220,20,60,0.4); }
  .divider { border:none; border-top:1px solid var(--border); margin:12px 0; }

  /* ── SUBMITTED STATE ── */
  .submitted-banner {
    background:rgba(0,168,120,0.08); border:1px solid rgba(0,168,120,0.4);
    border-radius:6px; padding:12px 14px; text-align:center;
    font-family:'Space Mono',monospace; font-size:11px; color:var(--jade);
    letter-spacing:1px; margin-top:10px;
  }
</style>
</head>
<body>

<!-- JOIN SCREEN -->
<div class="screen active" id="screenJoin">
  <div class="join-card">
    <div class="join-logo">Monopoly Deal</div>
    <div class="join-deal">MARKET EDITION</div>
    <div class="join-sub">HONG KONG FINANCIAL MARKETS</div>
    <div class="join-cn">香港金融市場模擬</div>
    <div class="asset-mini">
      <div class="asset-mini-tile re"><span class="mini-icon">🏠</span>Property</div>
      <div class="asset-mini-tile eq"><span class="mini-icon">📈</span>Equities</div>
      <div class="asset-mini-tile bd"><span class="mini-icon">🏦</span>Bonds</div>
      <div class="asset-mini-tile fx"><span class="mini-icon">💱</span>Forex</div>
    </div>
  </div>
  <div class="input-group">
    <label class="input-label">YOUR FUND NAME / PLAYER NAME</label>
    <input type="text" id="playerName" placeholder="e.g. Cathay Capital" maxlength="20" />
  </div>
  <button class="btn-full" id="joinBtn" onclick="joinGame()">🃏 JOIN AS FUND MANAGER</button>
  <p style="font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);margin-top:16px;text-align:center;letter-spacing:1px;line-height:1.6">Start with $10,000 · Trade across 4 rounds<br>Survive 2 macro shocks to become top fund manager</p>
</div>

<!-- GAME SCREEN -->
<div class="screen" id="screenGame">
  <div class="portfolio-bar">
    <div>
      <div class="player-name-tag">FUND MANAGER</div>
      <div class="player-title" id="displayName">—</div>
    </div>
    <div style="text-align:right">
      <div class="capital-label">PORTFOLIO VALUE</div>
      <div class="capital-display" id="displayCapital">$10,000</div>
    </div>
  </div>
  <div id="gameContent"></div>
</div>

<script>
const socket = io();
let myName = '';
let myCapital = 10000;
let votes = {};
let currentMarkets = [];
let timerInterval = null;
let alreadySubmitted = false;
let tipPurchased = false;

function joinGame() {
  const name = document.getElementById('playerName').value.trim();
  if (!name) return;
  myName = name;
  document.getElementById('displayName').textContent = name;
  socket.emit('join', { name });
  document.getElementById('screenJoin').classList.remove('active');
  document.getElementById('screenGame').classList.add('active');
}

socket.on('joined', ({ capital, startingCapital }) => {
  myCapital = capital;
  document.getElementById('displayCapital').textContent = '$' + capital.toLocaleString();
});

socket.on('capitalUpdate', ({ capital }) => {
  myCapital = capital;
  document.getElementById('displayCapital').textContent = '$' + capital.toLocaleString();
});

socket.on('votesReceived', () => {
  const el = document.getElementById('gameContent');
  const existing = el.querySelector('.submitted-banner');
  if (!existing) {
    const banner = document.createElement('div');
    banner.className = 'submitted-banner';
    banner.innerHTML = '✓ TRADES SUBMITTED — Watch the host screen for results';
    el.appendChild(banner);
  }
});

socket.on('tipRevealed', ({ tip, cost }) => {
  tipPurchased = true;
  const btn = document.getElementById('tipBtnEl');
  if (btn) btn.style.display = 'none';
  const existing = document.getElementById('tipBoxEl');
  if (!existing) {
    const box = document.createElement('div');
    box.id = 'tipBoxEl';
    box.className = 'tip-box';
    box.innerHTML = tip;
    const submitSection = document.querySelector('.submit-section');
    if (submitSection) submitSection.insertBefore(box, submitSection.firstChild);
  }
});

socket.on('tipError', msg => {
  alert(msg);
});

socket.on('roundResult', ({ pnl, totalCapital }) => {
  myCapital = totalCapital;
  document.getElementById('displayCapital').textContent = '$' + totalCapital.toLocaleString();
  const el = document.getElementById('gameContent');
  const sign = pnl >= 0 ? '+' : '';
  const cls = pnl >= 0 ? 'up' : 'down';
  el.innerHTML = `
    <div class="result-box">
      <div class="result-label">ROUND P&amp;L</div>
      <div class="result-pnl ${cls}">${sign}$${Math.abs(pnl).toLocaleString()}</div>
      <div class="result-total">Portfolio Value: $${totalCapital.toLocaleString()}</div>
      <div style="margin-top:16px;font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:1px">Watch the main screen for market analysis</div>
    </div>`;
});

socket.on('finalResult', ({ totalCapital, leaderboard }) => {
  myCapital = totalCapital;
  document.getElementById('displayCapital').textContent = '$' + totalCapital.toLocaleString();
});

socket.on('state', state => {
  if (!state.round && state.phase !== 'lobby' && state.phase !== 'end') return;
  if (state.round) currentMarkets = state.round.markets;

  if (state.phase === 'lobby') {
    document.getElementById('gameContent').innerHTML = `
      <div class="wait-box">
        <div class="wait-card">
          <span class="wait-icon">🃏</span>
          <div class="wait-title">Waiting for Host</div>
          <div class="wait-sub">Cards are being dealt...</div>
        </div>
        <div class="wait-dots"><div class="wait-dot"></div><div class="wait-dot"></div><div class="wait-dot"></div></div>
      </div>`;

  } else if (state.phase === 'news' && state.round) {
    alreadySubmitted = false; tipPurchased = false;
    const isShock = state.round.id === 2 || state.round.id === 3;
    const pillClass = state.round.id === 1 ? 'green' : state.round.id === 4 ? 'gold' : '';
    document.getElementById('gameContent').innerHTML = `
      <div class="card-pill ${pillClass}">${state.round.cardIcon} ${state.round.cardType}</div>
      <div class="round-title">${state.round.title}</div>
      <div style="font-size:13px;line-height:1.7;color:#8a8aa8;margin-top:8px">${state.round.news}</div>
      <div class="wait-box" style="padding:20px 0">
        <div class="wait-dots"><div class="wait-dot"></div><div class="wait-dot"></div><div class="wait-dot"></div></div>
        <div style="font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px;margin-top:10px">Host is opening the trading window...</div>
      </div>`;

  } else if (state.phase === 'voting' && state.round && !alreadySubmitted) {
    renderVoting(state);

  } else if (state.phase === 'reveal') {
    if (!document.querySelector('.result-box')) {
      document.getElementById('gameContent').innerHTML = `
        <div class="wait-box">
          <div class="wait-card">
            <span class="wait-icon">📊</span>
            <div class="wait-title">Prices Revealed!</div>
            <div class="wait-sub">Watch the main screen for analysis</div>
          </div>
        </div>`;
    }

  } else if (state.phase === 'end') {
    const lb = state.leaderboard;
    const rank = lb.findIndex(p => p.capital === myCapital) + 1 || lb.length;
    const diff = myCapital - 10000;
    const sign = diff >= 0 ? '+' : '';
    const col = diff >= 0 ? 'var(--jade)' : 'var(--crimson)';
    const medals = ['🥇','🥈','🥉'];
    const medal = rank <= 3 ? medals[rank-1] : `#${rank}`;
    document.getElementById('gameContent').innerHTML = `
      <div class="end-box">
        <div style="font-size:48px;margin-bottom:8px">${medal}</div>
        <div class="end-title">GAME OVER</div>
        <div style="font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;margin-bottom:10px">FINAL PORTFOLIO</div>
        <div style="font-family:'Playfair Display',serif;font-size:44px;font-weight:900;color:var(--gold-light);text-shadow:0 0 16px var(--gold-glow)">$${myCapital.toLocaleString()}</div>
        <div style="font-family:'Space Mono',monospace;font-size:13px;color:${col};margin-top:6px">${sign}$${Math.abs(diff).toLocaleString()} vs starting capital</div>
        <hr style="border:none;border-top:1px solid var(--border);margin:18px 0">
        <div style="font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;margin-bottom:8px">LEADERBOARD</div>
        ${lb.slice(0,5).map((p,i) => {
          const isMe = p.capital === myCapital;
          const d = p.capital-10000; const s = d>=0?'+':''; const c = d>=0?'var(--jade)':'var(--crimson)';
          return `<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:4px;margin-bottom:3px;background:${isMe?'rgba(201,168,76,0.06)':'var(--surface)'};border:1px solid ${isMe?'rgba(201,168,76,0.3)':'var(--border)'}">
            <span style="font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);width:18px">${i+1}</span>
            <span style="flex:1;font-size:12px;color:${isMe?'var(--gold-light)':'var(--text)'}">${p.name}${isMe?' ◀':''}</span>
            <span style="font-family:'Space Mono',monospace;font-size:11px;color:${c}">${s}$${Math.abs(d).toLocaleString()}</span>
          </div>`;
        }).join('')}
      </div>`;
  }
});

function renderVoting(state) {
  const AMOUNTS = [500, 1000, 2000, 5000];
  const el = document.getElementById('gameContent');
  const bar = Math.max(0, Math.round(((state.timerEnd - Date.now()) / 60000) * 100));
  const isShock = state.round.id === 2 || state.round.id === 3;
  const pillClass = state.round.id === 1 ? 'green' : state.round.id === 4 ? 'gold' : '';

  // Market type dots
  const marketDots = { 'HK Equities (HSI)': 'eq', 'HK Property': 'prop', 'HK Bonds': 'bond', 'HKD / Forex': 'fx' };

  el.innerHTML = `
    <div class="card-pill ${pillClass}">${state.round.cardIcon} ${state.round.cardType}</div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <div class="round-title" style="font-size:15px">${state.round.title}</div>
      <div id="timerText" style="font-family:'Playfair Display',serif;font-size:28px;font-weight:900;color:var(--gold)">60</div>
    </div>
    <div class="timer-bar-wrap"><div class="timer-bar" id="timerBar" style="width:${bar}%"></div></div>
    ${currentMarkets.map(m => {
      const dotClass = marketDots[m] || 'bond';
      return `
      <div class="market-section">
        <div class="market-label">
          <span class="market-type-dot ${dotClass}"></span>
          ${m}
        </div>
        <div class="direction-btns">
          <div class="dir-btn long-btn" onclick="setDir('${m}','long',this)">📈 LONG</div>
          <div class="dir-btn short-btn" onclick="setDir('${m}','short',this)">📉 SHORT</div>
          <div class="dir-btn skip-btn selected" onclick="setDir('${m}','skip',this)">— SKIP</div>
        </div>
        <div class="amount-row" id="amts-${m.replace(/[^a-z0-9]/gi,'_')}">
          ${AMOUNTS.map(a => `<div class="amt-btn" onclick="setAmt('${m}',${a},this)">$${a >= 1000 ? (a/1000)+'k' : a}</div>`).join('')}
        </div>
        <div class="mult-label">CONFIDENCE MULTIPLIER</div>
        <div class="mult-row" id="mult-${m.replace(/[^a-z0-9]/gi,'_')}">
          <div class="mult-btn selected" data-mult="1" onclick="setMult('${m}',1,this)">1× Normal</div>
          <div class="mult-btn" data-mult="2" onclick="setMult('${m}',2,this)">2× Risky</div>
          <div class="mult-btn" data-mult="3" onclick="setMult('${m}',3,this)">3× YOLO</div>
        </div>
      </div>`;
    }).join('')}
    <div class="submit-section">
      <button class="tip-btn" id="tipBtnEl" onclick="buyTip()">🔍 ANALYST TIP — $500 to unlock</button>
      <button class="btn-full" id="submitBtn" onclick="submitVotes()">🃏 SUBMIT POSITIONS</button>
    </div>`;

  currentMarkets.forEach(m => { votes[m] = { direction: 'skip', amount: 0, multiplier: 1 }; });
  startPlayerTimer(state.timerEnd);
}

function setDir(market, dir, el) {
  const section = el.closest('.market-section');
  section.querySelectorAll('.dir-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  if (!votes[market]) votes[market] = { direction: 'skip', amount: 0, multiplier: 1 };
  votes[market].direction = dir;
  if (dir === 'skip') votes[market].amount = 0;
}

function setAmt(market, amount, el) {
  const key = market.replace(/[^a-z0-9]/gi,'_');
  document.querySelectorAll(`#amts-${key} .amt-btn`).forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  if (!votes[market]) votes[market] = { direction: 'skip', amount: 0, multiplier: 1 };
  votes[market].amount = amount;
}

function setMult(market, mult, el) {
  const key = market.replace(/[^a-z0-9]/gi,'_');
  document.querySelectorAll(`#mult-${key} .mult-btn`).forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  if (!votes[market]) votes[market] = { direction: 'skip', amount: 0, multiplier: 1 };
  votes[market].multiplier = mult;
}

function buyTip() {
  if (tipPurchased) return;
  socket.emit('buyTip');
}

function submitVotes() {
  if (alreadySubmitted) return;
  const out = {};
  for (const [m, v] of Object.entries(votes)) {
    if (v.direction !== 'skip' && v.amount > 0) out[m] = v;
  }
  socket.emit('submitVotes', { votes: out });
  alreadySubmitted = true;
}

function startPlayerTimer(endTime) {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    const remaining = Math.max(0, Math.ceil((endTime - Date.now()) / 1000));
    const pct = Math.round((remaining / 60) * 100);
    const timerEl = document.getElementById('timerText');
    const barEl = document.getElementById('timerBar');
    if (timerEl) { timerEl.textContent = remaining; timerEl.style.color = remaining <= 10 ? 'var(--crimson)' : 'var(--gold)'; }
    if (barEl) { barEl.style.width = pct + '%'; barEl.classList.toggle('urgent', remaining <= 10); }
    if (remaining <= 0) clearInterval(timerInterval);
  }, 200);
}

document.getElementById('playerName').addEventListener('keydown', e => { if (e.key === 'Enter') joinGame(); });
</script>
</body>
</html>
